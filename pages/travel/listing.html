<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Listing — Nexabay</title>
  <link rel="stylesheet" href="../../css/main.css"/>
  <link rel="stylesheet" href="../../css/travel.css"/>
  <link rel="stylesheet" href="../../css/product.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="../../index.html" class="logo">
        <span class="logo-nexa">Nexa</span><span class="logo-bay">bay</span>
      </a>
      <div class="nav-actions">
        <a href="browse.html" class="nav-link">← All Listings</a>
      </div>
      <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <a href="../../index.html">Home</a>
      <a href="browse.html">Travel</a>
      <a href="../auth/login.html">Login</a>
    </div>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <div class="container">
      <a href="../../index.html">Home</a>
      <span>›</span>
      <a href="browse.html">Travel</a>
      <span>›</span>
      <span id="bread-name">Listing</span>
    </div>
  </div>

  <!-- LISTING PAGE -->
  <div class="container product-page" id="listing-page">
    <div class="loading-state">
      <div class="loading-spinner">⏳</div>
      <p>Loading listing...</p>
    </div>
  </div>

  <!-- BOOKING MODAL -->
  <div id="booking-modal-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:900;" onclick="closeBookingModal()"></div>
  <div id="booking-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:14px;max-width:420px;width:90%;max-height:88vh;overflow-y:auto;z-index:901;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:1.1em;font-weight:700;" id="booking-modal-title">Book Now</h3>
      <button onclick="closeBookingModal()" style="background:var(--gray);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;">✕</button>
    </div>

    <div id="booking-room-select" style="margin-bottom:16px;"></div>

    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="bk-name" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="bk-email" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" id="bk-phone" placeholder="080xxxxxxxx"/>
    </div>

    <div id="hotel-booking-fields">
      <div class="form-row-2">
        <div class="form-group">
          <label>Check-in Date *</label>
          <input type="date" id="bk-checkin"/>
        </div>
        <div class="form-group">
          <label>Check-out Date *</label>
          <input type="date" id="bk-checkout"/>
        </div>
      </div>
      <div class="form-group">
        <label>Number of Guests</label>
        <select id="bk-guests">
          <option value="1">1 Guest</option>
          <option value="2">2 Guests</option>
          <option value="3">3 Guests</option>
          <option value="4">4+ Guests</option>
        </select>
      </div>
    </div>

    <div id="other-booking-fields" style="display:none;">
      <div class="form-group">
        <label>Travel Date *</label>
        <input type="date" id="bk-travel-date"/>
      </div>
      <div class="form-group">
        <label>Number of Persons</label>
        <select id="bk-persons">
          <option value="1">1 Person</option>
          <option value="2">2 Persons</option>
          <option value="3">3 Persons</option>
          <option value="4">4 Persons</option>
          <option value="5">5+ Persons</option>
        </select>
      </div>
    </div>

    <div style="background:var(--gray);border-radius:8px;padding:12px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:0.9em;margin-bottom:6px;">
        <span>Selected</span>
        <span id="bk-selected-display">—</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-weight:800;font-size:1.1em;color:var(--orange);">
        <span>Total</span>
        <span id="bk-total-display">₦0</span>
      </div>
    </div>

    <div id="bk-error" class="ap-error" style="display:none;"></div>
    <div id="bk-success" class="ap-success" style="display:none;"></div>

    <button id="bk-pay-btn" onclick="confirmBooking()" style="width:100%;padding:14px;background:var(--orange);color:white;border:none;border-radius:8px;font-weight:700;font-size:1em;cursor:pointer;">
      🔒 Confirm Booking
    </button>
  </div>

  <div style="margin-bottom:48px;"></div>

  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase/config.js"></script>
  <script src="../../js/firebase/auth.js"></script>
  <script src="../../js/firebase/travel.js"></script>
  <script src="../../js/firebase/payment.js"></script>
  <script src="../../js/core/main.js"></script>
  <script>

    var currentListing = null;
    var selectedRoom = null;

    function loadListing() {
      var id = getParam('id');
      if (!id) { showError(); return; }

      db.collection('travelListings').doc(id).get()
        .then(function(doc) {
          if (!doc.exists) { showError(); return; }
          var data = doc.data();
          currentListing = data;
          currentListing.id = doc.id;

          if (data.roomTypes && data.roomTypes.length > 0) {
            selectedRoom = data.roomTypes[0];
          }

          renderListing(data);
          document.title = data.title + ' — Nexabay';
          var bread = document.getElementById('bread-name');
          if (bread) bread.textContent = data.title;
        })
        .catch(function(err) {
          console.log('Error:', err);
          showError();
        });
    }

    function renderListing(l) {
      var page = document.getElementById('listing-page');
      var mainContent = l.imageUrl
        ? '<img src="' + l.imageUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"/>'
        : l.emoji || '✈️';

      var typeIcon = { hotel: '🏨', flight: '✈️', tour: '🗺️' }[l.listingType] || '✈️';

      var amenitiesHtml = '';
      if (l.amenities && l.amenities.length > 0) {
        amenitiesHtml =
          '<div class="pd-divider"></div>' +
          '<div class="pd-desc">' +
            '<h3>Amenities</h3>' +
            '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">' +
              l.amenities.map(function(a) {
                return '<span style="background:var(--gray);padding:5px 12px;border-radius:6px;font-size:0.85em;">✓ ' + a + '</span>';
              }).join('') +
            '</div>' +
          '</div>';
      }

      var roomTypesHtml = '';
      if (l.roomTypes && l.roomTypes.length > 0) {
        roomTypesHtml =
          '<div class="pd-divider"></div>' +
          '<div class="pd-desc">' +
            '<h3>Room Types</h3>' +
            l.roomTypes.map(function(r) {
              return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">' +
                '<div>' +
                  '<div style="font-weight:700;">' + r.name + '</div>' +
                  (r.perks ? '<div style="font-size:0.8em;color:var(--text2);">' + r.perks + '</div>' : '') +
                '</div>' +
                '<div style="font-weight:800;color:var(--orange);">₦' + r.price.toLocaleString() + '/night</div>' +
              '</div>';
            }).join('') +
          '</div>';
      }

      var extraDetailsHtml = '';
      if (l.listingType === 'hotel') {
        if (l.checkIn) extraDetailsHtml += '<div class="pd-delivery-item">🕒 <b>Check-in:</b> ' + l.checkIn + '</div>';
        if (l.checkOut) extraDetailsHtml += '<div class="pd-delivery-item">🕒 <b>Check-out:</b> ' + l.checkOut + '</div>';
      } else if (l.listingType === 'flight') {
        if (l.departure) extraDetailsHtml += '<div class="pd-delivery-item">🛫 <b>From:</b> ' + l.departure + '</div>';
        if (l.destination) extraDetailsHtml += '<div class="pd-delivery-item">🛬 <b>To:</b> ' + l.destination + '</div>';
        if (l.duration) extraDetailsHtml += '<div class="pd-delivery-item">⏱️ <b>Duration:</b> ' + l.duration + '</div>';
        if (l.airline) extraDetailsHtml += '<div class="pd-delivery-item">✈️ <b>Airline:</b> ' + l.airline + '</div>';
        if (l.includes) extraDetailsHtml += '<div class="pd-delivery-item">✅ <b>Includes:</b> ' + l.includes + '</div>';
      } else if (l.listingType === 'tour') {
        if (l.duration) extraDetailsHtml += '<div class="pd-delivery-item">⏱️ <b>Duration:</b> ' + l.duration + '</div>';
        if (l.includes) extraDetailsHtml += '<div class="pd-delivery-item">✅ <b>Includes:</b> ' + l.includes + '</div>';
      }

      page.innerHTML =
        '<div class="product-detail">' +

          '<div class="pd-left">' +
            '<div class="pd-main-img">' + mainContent + '</div>' +
            '<div class="pd-badges">' +
              '<span class="pd-badge verified">✅ Nexabay Verified</span>' +
              '<span class="pd-badge secure">🔒 Secure Booking</span>' +
            '</div>' +
          '</div>' +

          '<div class="pd-right">' +

            '<div class="pd-category">' + typeIcon + ' ' + (l.category || l.listingType) + '</div>' +
            '<h1 class="pd-name">' + l.title + '</h1>' +

            '<div class="pd-price-row">' +
              '<span class="pd-price">₦' + parseInt(l.price).toLocaleString() + '</span>' +
              '<span style="color:var(--text2);font-size:0.9em;"> ' + (l.priceUnit || 'per night') + '</span>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-desc">' +
              '<h3>About This ' + (l.listingType === 'hotel' ? 'Hotel' : l.listingType === 'flight' ? 'Flight' : 'Tour') + '</h3>' +
              '<p>' + l.description + '</p>' +
            '</div>' +

            (extraDetailsHtml ? '<div class="pd-divider"></div><div class="pd-delivery">' + extraDetailsHtml + '</div>' : '') +

            amenitiesHtml +
            roomTypesHtml +

            '<div class="pd-divider"></div>' +

            '<div class="pd-seller">' +
              '<div class="pd-seller-avatar">' + (l.agentName || 'A')[0] + '</div>' +
              '<div>' +
                '<div class="pd-seller-name">' + (l.agentName || 'Nexabay Agent') + '</div>' +
                '<div class="pd-seller-loc">✈️ Travel Agent</div>' +
              '</div>' +
              '<a href="#" class="pd-chat-btn">💬 Chat Agent</a>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-actions">' +
              '<button class="pd-buy-btn" onclick="openBookingModal()">📅 Book Now</button>' +
            '</div>' +

          '</div>' +
        '</div>';
    }

    function openBookingModal() {
      var user = JSON.parse(localStorage.getItem('nexa_current_user') || 'null');
      if (!user) {
        showToast('⚠️ Please login to book', '#ff9500');
        setTimeout(function() { window.location.href = '../auth/login.html'; }, 1500);
        return;
      }

      document.getElementById('bk-name').value  = user.fullName || user.firstName || '';
      document.getElementById('bk-email').value = user.email || '';
      document.getElementById('bk-phone').value = user.phone || '';

      var title = document.getElementById('booking-modal-title');
      if (title) title.textContent = 'Book — ' + currentListing.title;

      var isHotel = currentListing.listingType === 'hotel';
      document.getElementById('hotel-booking-fields').style.display = isHotel ? 'block' : 'none';
      document.getElementById('other-booking-fields').style.display = isHotel ? 'none' : 'block';

      var today = new Date().toISOString().split('T')[0];
      var tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
      if (isHotel) {
        document.getElementById('bk-checkin').value  = today;
        document.getElementById('bk-checkout').value = tomorrow;
      } else {
        document.getElementById('bk-travel-date').value = today;
      }

      renderRoomSelect();
      updateBookingSummary();

      document.getElementById('booking-modal-overlay').style.display = 'block';
      document.getElementById('booking-modal').style.display = 'block';
    }

    function renderRoomSelect() {
      var container = document.getElementById('booking-room-select');
      if (!currentListing.roomTypes || currentListing.roomTypes.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML =
        '<h4 style="margin-bottom:8px;">Select Room Type</h4>' +
        currentListing.roomTypes.map(function(r, i) {
          var isSelected = selectedRoom && selectedRoom.name === r.name;
          return '<div onclick="selectRoom(' + i + ')" style="border:2px solid ' + (isSelected ? 'var(--orange)' : 'var(--border)') + ';border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;background:' + (isSelected ? '#fff8f0' : 'white') + ';">' +
            '<div style="display:flex;justify-content:space-between;">' +
              '<div>' +
                '<div style="font-weight:700;">' + r.name + '</div>' +
                (r.perks ? '<div style="font-size:0.8em;color:var(--text2);">' + r.perks + '</div>' : '') +
              '</div>' +
              '<div style="font-weight:800;color:var(--orange);">₦' + r.price.toLocaleString() + '/night</div>' +
            '</div>' +
          '</div>';
        }).join('');
    }

    function selectRoom(index) {
      selectedRoom = currentListing.roomTypes[index];
      renderRoomSelect();
      updateBookingSummary();
    }

    function updateBookingSummary() {
      var price = selectedRoom ? selectedRoom.price : currentListing.price;
      var label = selectedRoom ? selectedRoom.name : currentListing.title;
      document.getElementById('bk-selected-display').textContent = label;
      document.getElementById('bk-total-display').textContent = '₦' + parseInt(price).toLocaleString();
    }

    function closeBookingModal() {
      document.getElementById('booking-modal-overlay').style.display = 'none';
      document.getElementById('booking-modal').style.display = 'none';
    }

    function confirmBooking() {
      var name  = document.getElementById('bk-name').value.trim();
      var email = document.getElementById('bk-email').value.trim();
      var phone = document.getElementById('bk-phone').value.trim();
      var errEl = document.getElementById('bk-error');
      var sucEl = document.getElementById('bk-success');

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!name)  { errEl.textContent = 'Enter your name';  errEl.style.display = 'block'; return; }
      if (!email) { errEl.textContent = 'Enter your email'; errEl.style.display = 'block'; return; }

      var btn = document.getElementById('bk-pay-btn');
      btn.textContent = 'Processing...';
      btn.disabled = true;

      var price = selectedRoom ? selectedRoom.price : currentListing.price;
      var roomName = selectedRoom ? selectedRoom.name : '';
      var checkin  = document.getElementById('bk-checkin') ? document.getElementById('bk-checkin').value : '';
      var checkout = document.getElementById('bk-checkout') ? document.getElementById('bk-checkout').value : '';
      var travelDate = document.getElementById('bk-travel-date') ? document.getElementById('bk-travel-date').value : '';

      nexaPayWithPaystack({
        email:     email,
        amount:    price,
        name:      name,
        orderId:   'TRV-' + currentListing.id + '-' + Date.now(),
        orderType: 'travel',
        onSuccess: function(reference) {
          nexaCreateTravelBooking(currentListing.id, {
            customerName:  name,
            customerEmail: email,
            customerPhone: phone,
            listingTitle:  currentListing.title,
            listingType:   currentListing.listingType,
            roomType:      roomName,
            checkIn:       checkin,
            checkOut:      checkout,
            travelDate:    travelDate,
            guests:        1,
            totalPrice:    price,
            paymentRef:    reference,
            agentId:       currentListing.agentId,
          }).then(function() {
            sucEl.textContent = '🎉 Booking confirmed! Reference: ' + reference;
            sucEl.style.display = 'block';
            btn.textContent = '✅ Booked!';
            setTimeout(function() { closeBookingModal(); }, 2000);
          }).catch(function(err) {
            sucEl.textContent = '🎉 Payment successful! Reference: ' + reference;
            sucEl.style.display = 'block';
            btn.textContent = '✅ Booked!';
          });
        },
        onCancel: function() {
          btn.textContent = '🔒 Confirm Booking';
          btn.disabled = false;
          showToast('⚠️ Booking cancelled', '#ff9500');
        }
      });
    }

    function showError() {
      document.getElementById('listing-page').innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">😕</div>' +
          '<h3>Listing not found</h3>' +
          '<p>This listing may have been removed</p>' +
          '<a href="browse.html" class="btn-primary">Browse Travel</a>' +
        '</div>';
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadListing();
    });

  </script>

</body>
</html>
