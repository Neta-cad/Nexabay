  <!-- BREADCRUMB -->

    <div class="container">
      <a href="../../index.html">Home</a>

  <!-- PRODUCT DETAIL -->

      <div class="loading-spinner">⏳</div>

    </div>
  </div>

  <!-- RELATED PRODUCTS -->
  <div class="container" id="related-section" style="display:none;">
    <div class="sec-header" style="margin-top:40px;">
      <h2 class="section-title">Related Products</h2>
      <a href="browse.html" class="see-all">See All →</a>
    </div>
    <div class="products-grid" id="related-products"></div>
  </div>

  <div style="margin-bottom:48px;"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase/config.js"></script>
  <script src="../../js/firebase/auth.js"></script>
  <script src="../../js/firebase/products.js"></script>
  <script src="../../js/core/main.js"></script>
  <script>

    var DEMO_PRODUCTS = [
      { id:1,  name:'iPhone 15 Pro Max 256GB',   price:850000, oldPrice:950000, rating:4.8, reviews:234, location:'Lagos',         emoji:'📱', category:'Electronics', condition:'new',  seller:'TechHub Lagos',  sold:1240, desc:'Brand new iPhone 15 Pro Max with 256GB storage. Comes with original box, charger and earphones. 1 year warranty included. Available in Black, White and Gold.' },
      { id:2,  name:'Samsung Galaxy S24 Ultra',   price:780000, oldPrice:900000, rating:4.7, reviews:189, location:'Abuja',         emoji:'📱', category:'Electronics', condition:'new',  seller:'GadgetPro NG',   sold:890,  desc:'Samsung Galaxy S24 Ultra with built-in S-Pen. 12GB RAM, 256GB storage. Official Samsung warranty. Ships within 24 hours.' },
      { id:3,  name:'Nike Air Force 1 Sneakers',  price:45000,  oldPrice:60000,  rating:4.7, reviews:312, location:'Lagos',         emoji:'👟', category:'Fashion',     condition:'new',  seller:'SneakerWorld',   sold:2100, desc:'100% original Nike Air Force 1 sneakers. Available in sizes 39-46. Multiple colours available. Ships nationwide.' },
      { id:4,  name:'Ankara Print Dress',         price:15000,  oldPrice:22000,  rating:4.9, reviews:445, location:'Kano',          emoji:'👗', category:'Fashion',     condition:'new',  seller:'AfrikaStyles',   sold:3400, desc:'Beautiful Ankara print dress made from high quality fabric. Available in multiple sizes S to XXL and various prints. Custom sizing available.' },
      { id:5,  name:'Samsung 55" Smart TV 4K',    price:320000, oldPrice:400000, rating:4.6, reviews:98,  location:'Port Harcourt', emoji:'📺', category:'Electronics', condition:'new',  seller:'ElectroNG',      sold:560,  desc:'Samsung 55 inch 4K Smart TV with built-in WiFi. Netflix, YouTube and more. 2 year warranty. Free delivery in PH.' },
      { id:6,  name:'Gaming Laptop RTX 4060',     price:650000, oldPrice:750000, rating:4.8, reviews:67,  location:'Lagos',         emoji:'💻', category:'Electronics', condition:'new',  seller:'TechHub Lagos',  sold:340,  desc:'High performance gaming laptop with RTX 4060 GPU, 16GB RAM, 512GB SSD. Perfect for gaming and professional work.' },
      { id:7,  name:'Designer Leather Handbag',   price:28000,  oldPrice:35000,  rating:4.5, reviews:156, location:'Lagos',         emoji:'👜', category:'Fashion',     condition:'new',  seller:'LuxuryBags NG',  sold:780,  desc:'Premium leather handbag with gold accessories. Multiple compartments. Available in Brown, Black and Red.' },
      { id:8,  name:'Bluetooth Wireless Speaker', price:18000,  oldPrice:25000,  rating:4.6, reviews:145, location:'Enugu',         emoji:'🔊', category:'Electronics', condition:'new',  seller:'SoundZone',      sold:920,  desc:'Powerful wireless Bluetooth speaker with 20 hours battery life. Waterproof design. Deep bass sound quality.' },
      { id:9,  name:'Gold Wrist Watch',           price:35000,  oldPrice:45000,  rating:4.7, reviews:89,  location:'Abuja',         emoji:'⌚', category:'Fashion',     condition:'new',  seller:'TimeZone NG',    sold:450,  desc:'Elegant gold wrist watch for men and women. Stainless steel strap. Water resistant up to 30m. Battery included.' },
      { id:10, name:'PS5 Console + 2 Controllers',price:450000, oldPrice:520000, rating:4.9, reviews:234, location:'Lagos',         emoji:'🎮', category:'Electronics', condition:'new',  seller:'GameZone NG',    sold:670,  desc:'Brand new PlayStation 5 console with 2 wireless controllers. Includes 1 month PS Plus subscription. Official Sony product.' },
      { id:11, name:'Sofa Set 3+1+1',             price:180000, oldPrice:220000, rating:4.5, reviews:67,  location:'Lagos',         emoji:'🛋️', category:'Home',        condition:'new',  seller:'HomeStyle NG',   sold:230,  desc:'Premium 5-seater sofa set. High quality foam padding. Available in Grey, Brown and Blue. Free delivery in Lagos.' },
      { id:12, name:'Air Fryer 5L',               price:35000,  oldPrice:45000,  rating:4.7, reviews:189, location:'Abuja',         emoji:'🍳', category:'Home',        condition:'new',  seller:'KitchenPlus',    sold:1100, desc:'5 litre digital air fryer with 8 preset cooking modes. Uses 80% less oil. Easy clean non-stick basket.' },
      { id:13, name:'Face Moisturizer SPF 50',    price:8500,   oldPrice:12000,  rating:4.6, reviews:267, location:'Lagos',         emoji:'💄', category:'Beauty',      condition:'new',  seller:'GlowUp Beauty',  sold:2300, desc:'Lightweight daily moisturizer with SPF 50 sun protection. Suitable for all skin types. Dermatologist tested.' },
      { id:14, name:'Football Boots Size 40-45',  price:22000,  oldPrice:30000,  rating:4.5, reviews:134, location:'Kano',          emoji:'⚽', category:'Sports',      condition:'new',  seller:'SportZone NG',   sold:890,  desc:'Professional football boots with firm ground studs. Available in sizes 40-45. Lightweight and durable design.' },
      { id:15, name:'Organic Honey 1kg',          price:5000,   oldPrice:7000,   rating:4.8, reviews:345, location:'Ibadan',        emoji:'🍯', category:'Food',        condition:'new',  seller:'NatureFoods',    sold:4500, desc:'100% pure organic honey sourced from Nigerian farms. No additives or preservatives. Rich in natural antioxidants.' },
      { id:16, name:'Refurbished iPhone 12',      price:180000, oldPrice:250000, rating:4.3, reviews:78,  location:'Lagos',         emoji:'📱', category:'Electronics', condition:'used', seller:'PhoneDeals NG',  sold:340,  desc:'Refurbished iPhone 12 in excellent condition. Battery health 89%. Comes with charger. 3 month warranty.' },
    ];

    var currentProduct = null;
    var selectedQty = 1;

    var ALL_PRODUCTS = DEMO_PRODUCTS.slice();

    function loadProduct() {
      var rawId = getParam('id');
      if (!rawId) {
        showError();
        return;
      }

      var numericId = parseInt(rawId);
      var isDemoId = !isNaN(numericId) && String(numericId) === rawId;

      if (isDemoId) {
        currentProduct = DEMO_PRODUCTS.find(function(p) { return p.id === numericId; });
        if (!currentProduct) { showError(); return; }
        finishLoadingProduct(currentProduct);
        return;
      }

      // Real Firestore product
      db.collection('products').doc(rawId).get()
        .then(function(doc) {
          if (!doc.exists) { showError(); return; }
          var data = doc.data();
          currentProduct = {
            id: doc.id,
            name: data.name,
            price: data.price,
            oldPrice: data.oldPrice || data.price,
            rating: data.rating || 0,
            reviews: data.reviews || 0,
            location: data.location,
            emoji: data.emoji || '📦',
            imageUrl: data.imageUrl || '',
            category: data.category,
            condition: (data.condition || 'new').indexOf('used') === 0 ? 'used' : 'new',
            seller: data.sellerName || 'Nexabay Seller',
            sold: data.sold || 0,
            desc: data.description || 'No description provided.',
            sellerId: data.sellerId || '',
          };
          ALL_PRODUCTS = DEMO_PRODUCTS.concat([currentProduct]);
          finishLoadingProduct(currentProduct);
        })
        .catch(function(err) {
          console.log('Error loading product:', err);
          showError();
        });
    }

    function finishLoadingProduct(product) {
      renderProduct(product);
      renderRelated(product);
      document.title = product.name + ' — Nexabay';
      var bread = document.getElementById('bread-name');
      if (bread) bread.textContent = product.name;
    }

    function renderProduct(p) {
      var discount = Math.round((1 - p.price / p.oldPrice) * 100);
      var page = document.getElementById('product-page');

      page.innerHTML =
        '<div class="product-detail">' +

          // LEFT — Image
          (function() {
            var mainContent = p.imageUrl
              ? '<img src="' + p.imageUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"/>'
              : p.emoji;
            return '<div class="pd-left">' +
              '<div class="pd-main-img">' + mainContent + '</div>' +
              '<div class="pd-thumbs">' +
                '<div class="pd-thumb active">' + mainContent + '</div>' +
                '<div class="pd-thumb">' + mainContent + '</div>' +
                '<div class="pd-thumb">' + mainContent + '</div>' +
              '</div>';
          })() +
            '<div class="pd-badges">' +
              '<span class="pd-badge verified">✅ Verified Seller</span>' +
              '<span class="pd-badge secure">🔒 Secure Payment</span>' +
              '<span class="pd-badge returns">↩️ Easy Returns</span>' +
            '</div>' +
          '</div>' +

          // RIGHT — Info
          '<div class="pd-right">' +

            '<div class="pd-category">' + p.category + ' • ' + p.condition.toUpperCase() + '</div>' +
            '<h1 class="pd-name">' + p.name + '</h1>' +

            '<div class="pd-rating-row">' +
              '<span class="pd-stars">⭐ ' + p.rating + '</span>' +
              '<span class="pd-reviews">(' + p.reviews + ' reviews)</span>' +
              '<span class="pd-sold">' + p.sold.toLocaleString() + ' sold</span>' +
            '</div>' +

            '<div class="pd-price-row">' +
              '<span class="pd-price">₦' + p.price.toLocaleString() + '</span>' +
              '<span class="pd-old-price">₦' + p.oldPrice.toLocaleString() + '</span>' +
              '<span class="pd-discount">-' + discount + '% OFF</span>' +
            '</div>' +

            '<div class="pd-savings">You save: ₦' + (p.oldPrice - p.price).toLocaleString() + '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-desc">' +
              '<h3>Description</h3>' +
              '<p>' + p.desc + '</p>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-seller">' +
              '<div class="pd-seller-avatar">' + p.seller[0] + '</div>' +
              '<div>' +
                '<div class="pd-seller-name">' + p.seller + '</div>' +
                '<div class="pd-seller-loc">📍 ' + p.location + '</div>' +
              '</div>' +
              '<a href="#" class="pd-chat-btn">💬 Chat Seller</a>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-qty-row">' +
              '<span class="pd-qty-label">Quantity:</span>' +
              '<div class="pd-qty-control">' +
                '<button onclick="changeQty(-1)">−</button>' +
                '<span id="qty-display">1</span>' +
                '<button onclick="changeQty(1)">+</button>' +
              '</div>' +
            '</div>' +

            '<div class="pd-actions">' +
              '<button class="pd-buy-btn" onclick="buyNow()">⚡ Buy Now</button>' +
              '<button class="pd-cart-btn" onclick="addProductToCart()">🛒 Add to Cart</button>' +
              '<button class="pd-wish-btn" onclick="addToWishlist()">❤️</button>' +
            '</div>' +

            '<div class="pd-delivery">' +
              '<div class="pd-delivery-item">🚚 <b>Delivery:</b> Lagos 1-2 days • Other states 3-5 days</div>' +
              '<div class="pd-delivery-item">🔒 <b>Payment:</b> Secured by Nexabay Escrow</div>' +
              '<div class="pd-delivery-item">↩️ <b>Returns:</b> 7-day return policy</div>' +
            '</div>' +

          '</div>' +
        '</div>' +

        // REVIEWS SECTION
        '<div class="pd-reviews-section">' +
          '<h2>Customer Reviews</h2>' +
          '<div class="pd-reviews-summary">' +
            '<div class="pd-big-rating">' + p.rating + '</div>' +
            '<div class="pd-rating-bars">' +
              renderRatingBars() +
            '</div>' +
          '</div>' +
          '<div class="pd-reviews-list">' +
            renderSampleReviews(p) +
          '</div>' +
        '</div>';
    }

    function renderRatingBars() {
      var bars = [
        { stars: 5, pct: 70 },
        { stars: 4, pct: 18 },
        { stars: 3, pct: 7  },
        { stars: 2, pct: 3  },
        { stars: 1, pct: 2  },
      ];
      return bars.map(function(b) {
        return '<div class="rating-bar-row">' +
          '<span>' + b.stars + '⭐</span>' +
          '<div class="rating-bar-track">' +
            '<div class="rating-bar-fill" style="width:' + b.pct + '%"></div>' +
          '</div>' +
          '<span>' + b.pct + '%</span>' +
        '</div>';
      }).join('');
    }

    function renderSampleReviews(p) {
      var names = ['Adewale O.', 'Fatima K.', 'Chidi E.', 'Amina B.', 'Emeka N.'];
      var comments = [
        'Excellent product! Exactly as described. Fast delivery too.',
        'Very good quality. The seller was responsive and helpful.',
        'I am very satisfied. Will definitely buy again from this seller.',
        'Great value for money. Highly recommend to everyone.',
        'Good product but delivery took a bit longer than expected.',
      ];
      return names.slice(0, 3).map(function(name, i) {
        return '<div class="review-card">' +
          '<div class="review-top">' +
            '<div class="review-avatar">' + name[0] + '</div>' +
            '<div>' +
              '<div class="review-name">' + name + '</div>' +
              '<div class="review-stars">⭐⭐⭐⭐⭐</div>' +
            '</div>' +
            '<div class="review-date">2 days ago</div>' +
          '</div>' +
          '<p class="review-text">' + comments[i] + '</p>' +
        '</div>';
      }).join('');
    }

    function renderRelated(p) {
      var related = ALL_PRODUCTS.filter(function(item) {
        return item.category === p.category && item.id !== p.id;
      }).slice(0, 4);

      if (related.length === 0) return;

      var section = document.getElementById('related-section');
      var grid = document.getElementById('related-products');
      section.style.display = 'block';

      grid.innerHTML = related.map(function(item) {
        var disc = Math.round((1 - item.price / item.oldPrice) * 100);
        return '<div class="product-card" onclick="window.location.href=\'product.html?id=' + item.id + '\'">' +
          '<div class="product-img">' + item.emoji +
            '<div class="discount-badge">-' + disc + '%</div>' +
          '</div>' +
          '<div class="product-info">' +
            '<div class="product-name">' + item.name + '</div>' +
            '<span class="product-price">₦' + item.price.toLocaleString() + '</span>' +
            '<span class="product-old-price">₦' + item.oldPrice.toLocaleString() + '</span>' +
            '<div class="product-rating">⭐ ' + item.rating + '</div>' +
            '<button class="add-cart-btn" onclick="event.stopPropagation();addToCart({id:' + item.id + ',name:\'' + item.name + '\',price:' + item.price + ',emoji:\'' + item.emoji + '\'})">🛒 Add to Cart</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function changeQty(delta) {
      selectedQty = Math.max(1, Math.min(99, selectedQty + delta));
      var el = document.getElementById('qty-display');
      if (el) el.textContent = selectedQty;
    }

    function addProductToCart() {
      if (!currentProduct) return;
      for (var i = 0; i < selectedQty; i++) {
        addToCart({
          id:       currentProduct.id,
          name:     currentProduct.name,
          price:    currentProduct.price,
          emoji:    currentProduct.emoji,
          imageUrl: currentProduct.imageUrl || '',
          sellerId: currentProduct.sellerId || '',
        });
      }
    }

    function buyNow() {
      addProductToCart();
      window.location.href = 'cart.html';
    }

    function addToWishlist() {
      var wishlist = JSON.parse(localStorage.getItem('nexa_wishlist') || '[]');
      if (!currentProduct) return;
      var exists = wishlist.find(function(w) { return w.id === currentProduct.id; });
      if (exists) {
        showToast('Already in wishlist!', '#ff9500');
        return;
      }
      wishlist.push(currentProduct);
      localStorage.setItem('nexa_wishlist', JSON.stringify(wishlist));
      showToast('❤️ Added to wishlist!');
    }

    function showError() {
      var page = document.getElementById('product-page');
      page.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">😕</div>' +
          '<h3>Product not found</h3>' +
          '<p>This product may have been removed</p>' +
          '<a href="browse.html" class="btn-primary">Browse Products</a>' +
        '</div>';
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadProduct();
      updateCartCount();
    });

  </script>

</body>
</html>
