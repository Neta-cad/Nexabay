<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event — Nexabay</title>
  <link rel="stylesheet" href="../../css/main.css"/>
  <link rel="stylesheet" href="../../css/events.css"/>
  <link rel="stylesheet" href="../../css/product.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="../../index.html" class="logo">
        <span class="logo-nexa">Nexa</span><span class="logo-bay">bay</span>
      </a>
      <div class="nav-actions">
        <a href="browse.html" class="nav-link">← All Events</a>
      </div>
      <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <a href="../../index.html">Home</a>
      <a href="browse.html">Events</a>
      <a href="../auth/login.html">Login</a>
    </div>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <div class="container">
      <a href="../../index.html">Home</a>
      <span>›</span>
      <a href="browse.html">Events</a>
      <span>›</span>
      <span id="bread-name">Event</span>
    </div>
  </div>

  <!-- EVENT PAGE -->
  <div class="container product-page" id="event-page">
    <div class="loading-state">
      <div class="loading-spinner">⏳</div>
      <p>Loading event...</p>
    </div>
  </div>

  <!-- TICKET PURCHASE MODAL -->
  <div id="ticket-modal-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:900;" onclick="closeTicketModal()"></div>
  <div id="ticket-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:14px;max-width:420px;width:90%;max-height:88vh;overflow-y:auto;z-index:901;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:1.1em;font-weight:700;">🎟️ Get Tickets</h3>
      <button onclick="closeTicketModal()" style="background:var(--gray);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;">✕</button>
    </div>

    <div id="ticket-tiers-list" style="margin-bottom:16px;"></div>

    <div class="pd-divider"></div>

    <h4 style="margin:14px 0 10px;">Your Details</h4>
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="tkt-name" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="tkt-email" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" id="tkt-phone" placeholder="080xxxxxxxx"/>
    </div>

    <div style="background:var(--gray);border-radius:8px;padding:12px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:0.9em;margin-bottom:6px;">
        <span>Selected Tier</span>
        <span id="tkt-tier-display">—</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:0.9em;margin-bottom:6px;">
        <span>Quantity</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <button onclick="changeQty(-1)" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:white;cursor:pointer;font-weight:700;">−</button>
          <span id="tkt-qty-display">1</span>
          <button onclick="changeQty(1)" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:white;cursor:pointer;font-weight:700;">+</button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-weight:800;font-size:1.1em;color:var(--orange);">
        <span>Total</span>
        <span id="tkt-total-display">₦0</span>
      </div>
    </div>

    <div id="tkt-error" class="ap-error" style="display:none;"></div>
    <div id="tkt-success" class="ap-success" style="display:none;"></div>

    <button id="tkt-pay-btn" onclick="purchaseTicket()" style="width:100%;padding:14px;background:var(--orange);color:white;border:none;border-radius:8px;font-weight:700;font-size:1em;cursor:pointer;">
      🔒 Buy Tickets
    </button>
  </div>

  <div style="margin-bottom:48px;"></div>

  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase/config.js"></script>
  <script src="../../js/firebase/auth.js"></script>
  <script src="../../js/firebase/events.js"></script>
  <script src="../../js/firebase/payment.js"></script>
  <script src="../../js/core/main.js"></script>
  <script>

    var currentEvent = null;
    var selectedTier = null;
    var ticketQty = 1;

    function loadEvent() {
      var id = getParam('id');
      if (!id) { showError(); return; }

      db.collection('events').doc(id).get()
        .then(function(doc) {
          if (!doc.exists) { showError(); return; }
          var data = doc.data();
          currentEvent = {
            id:            doc.id,
            title:         data.title,
            category:      data.category,
            description:   data.description,
            eventType:     data.eventType || 'physical',
            date:          data.date,
            time:          data.time,
            endTime:       data.endTime || '',
            venue:         data.venue || '',
            address:       data.address || '',
            onlineLink:    data.onlineLink || '',
            location:      data.location,
            ticketTiers:   data.ticketTiers || [],
            imageUrl:      data.imageUrl || '',
            emoji:         data.emoji || '🎉',
            organizerName: data.organizerName || 'Organizer',
            soldTickets:   data.soldTickets || 0,
            totalTickets:  data.totalTickets || 0,
          };
          renderEvent(currentEvent);
          document.title = currentEvent.title + ' — Nexabay';
          var bread = document.getElementById('bread-name');
          if (bread) bread.textContent = currentEvent.title;
        })
        .catch(function(err) {
          console.log('Error:', err);
          showError();
        });
    }

    function renderEvent(e) {
      var page = document.getElementById('event-page');
      var mainContent = e.imageUrl
        ? '<img src="' + e.imageUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"/>'
        : e.emoji;

      var lowestPrice = e.ticketTiers.length > 0
        ? Math.min.apply(null, e.ticketTiers.map(function(t) { return t.price; }))
        : 0;

      var tiersHtml = e.ticketTiers.map(function(t) {
        var available = t.quantity - (t.sold || 0);
        return '<div style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<div>' +
              '<div style="font-weight:700;">' + t.name + '</div>' +
              (t.perks ? '<div style="font-size:0.8em;color:var(--text2);">' + t.perks + '</div>' : '') +
              '<div style="font-size:0.8em;color:var(--text2);">' + available + ' tickets left</div>' +
            '</div>' +
            '<div style="text-align:right;">' +
              '<div style="font-weight:800;color:var(--orange);font-size:1.1em;">' +
                (t.price === 0 ? 'Free' : '₦' + t.price.toLocaleString()) +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      var locationHtml = e.eventType === 'virtual'
        ? '<div class="pd-delivery-item">🌐 <b>Platform:</b> ' + e.venue + '</div>'
        : '<div class="pd-delivery-item">📍 <b>Venue:</b> ' + e.venue + (e.address ? ', ' + e.address : '') + '</div>' +
          '<div class="pd-delivery-item">🗺️ <b>State:</b> ' + e.location + '</div>';

      page.innerHTML =
        '<div class="product-detail">' +

          '<div class="pd-left">' +
            '<div class="pd-main-img">' + mainContent + '</div>' +
            '<div class="pd-badges">' +
              '<span class="pd-badge verified">✅ Nexabay Event</span>' +
              '<span class="pd-badge secure">🔒 Secure Tickets</span>' +
            '</div>' +
          '</div>' +

          '<div class="pd-right">' +

            '<div class="pd-category">' + e.category + ' • ' + (e.eventType === 'virtual' ? '🌐 Online' : '📍 Physical') + '</div>' +
            '<h1 class="pd-name">' + e.title + '</h1>' +

            '<div class="pd-price-row">' +
              '<span class="pd-price">' + (lowestPrice === 0 ? 'Free' : 'from ₦' + lowestPrice.toLocaleString()) + '</span>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-delivery">' +
              '<div class="pd-delivery-item">📅 <b>Date:</b> ' + e.date + '</div>' +
              '<div class="pd-delivery-item">🕒 <b>Time:</b> ' + e.time + (e.endTime ? ' — ' + e.endTime : '') + '</div>' +
              locationHtml +
              '<div class="pd-delivery-item">🎟️ <b>Tickets Sold:</b> ' + e.soldTickets + ' / ' + e.totalTickets + '</div>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-desc">' +
              '<h3>About This Event</h3>' +
              '<p>' + e.description + '</p>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-desc">' +
              '<h3>Ticket Tiers</h3>' +
              tiersHtml +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-seller">' +
              '<div class="pd-seller-avatar">' + e.organizerName[0] + '</div>' +
              '<div>' +
                '<div class="pd-seller-name">' + e.organizerName + '</div>' +
                '<div class="pd-seller-loc">Event Organizer</div>' +
              '</div>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-actions">' +
              '<button class="pd-buy-btn" onclick="openTicketModal()">🎟️ Get Tickets</button>' +
            '</div>' +

          '</div>' +
        '</div>';
    }

    function openTicketModal() {
      var user = JSON.parse(localStorage.getItem('nexa_current_user') || 'null');
      if (!user) {
        showToast('⚠️ Please login to buy tickets', '#ff9500');
        setTimeout(function() { window.location.href = '../auth/login.html'; }, 1500);
        return;
      }

      document.getElementById('tkt-name').value  = user.fullName || user.firstName || '';
      document.getElementById('tkt-email').value = user.email || '';
      document.getElementById('tkt-phone').value = user.phone || '';

      selectedTier = currentEvent.ticketTiers[0] || null;
      ticketQty = 1;

      renderTicketTiersList();
      updateTicketSummary();

      document.getElementById('ticket-modal-overlay').style.display = 'block';
      document.getElementById('ticket-modal').style.display = 'block';
    }

    function closeTicketModal() {
      document.getElementById('ticket-modal-overlay').style.display = 'none';
      document.getElementById('ticket-modal').style.display = 'none';
    }

    function renderTicketTiersList() {
      var container = document.getElementById('ticket-tiers-list');
      container.innerHTML = currentEvent.ticketTiers.map(function(t, i) {
        var isSelected = selectedTier && selectedTier.name === t.name;
        var available = t.quantity - (t.sold || 0);
        return '<div onclick="selectTier(' + i + ')" style="border:2px solid ' + (isSelected ? 'var(--orange)' : 'var(--border)') + ';border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;background:' + (isSelected ? '#fff8f0' : 'white') + ';">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<div>' +
              '<div style="font-weight:700;">' + t.name + '</div>' +
              '<div style="font-size:0.8em;color:var(--text2);">' + available + ' available</div>' +
            '</div>' +
            '<div style="font-weight:800;color:var(--orange);">' +
              (t.price === 0 ? 'Free' : '₦' + t.price.toLocaleString()) +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function selectTier(index) {
      selectedTier = currentEvent.ticketTiers[index];
      ticketQty = 1;
      renderTicketTiersList();
      updateTicketSummary();
    }

    function changeQty(delta) {
      ticketQty = Math.max(1, Math.min(10, ticketQty + delta));
      updateTicketSummary();
    }

    function updateTicketSummary() {
      var tierDisplay = document.getElementById('tkt-tier-display');
      var qtyDisplay  = document.getElementById('tkt-qty-display');
      var totalDisplay = document.getElementById('tkt-total-display');

      if (tierDisplay) tierDisplay.textContent = selectedTier ? selectedTier.name : '—';
      if (qtyDisplay)  qtyDisplay.textContent  = ticketQty;
      var total = selectedTier ? selectedTier.price * ticketQty : 0;
      if (totalDisplay) totalDisplay.textContent = total === 0 ? 'Free' : '₦' + total.toLocaleString();
    }

    function purchaseTicket() {
      var name  = document.getElementById('tkt-name').value.trim();
      var email = document.getElementById('tkt-email').value.trim();
      var phone = document.getElementById('tkt-phone').value.trim();
      var errEl = document.getElementById('tkt-error');
      var sucEl = document.getElementById('tkt-success');

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!name)         { errEl.textContent = 'Enter your name';  errEl.style.display = 'block'; return; }
      if (!email)        { errEl.textContent = 'Enter your email'; errEl.style.display = 'block'; return; }
      if (!selectedTier) { errEl.textContent = 'Select a ticket tier'; errEl.style.display = 'block'; return; }

      var btn = document.getElementById('tkt-pay-btn');
      btn.textContent = 'Processing...';
      btn.disabled = true;

      var total = selectedTier.price * ticketQty;

      var doFinish = function(ref) {
        nexaBuyTicket(currentEvent.id, {
          buyerName:  name,
          buyerEmail: email,
          buyerPhone: phone,
          tierName:   selectedTier.name,
          price:      selectedTier.price,
          quantity:   ticketQty,
          paymentRef: ref || '',
        }).then(function() {
          sucEl.textContent = '🎟️ Ticket confirmed! Check your email for details.';
          sucEl.style.display = 'block';
          btn.textContent = '✅ Ticket Purchased!';
          setTimeout(function() { closeTicketModal(); }, 2000);
        }).catch(function(err) {
          errEl.textContent = 'Error saving ticket: ' + err.message;
          errEl.style.display = 'block';
          btn.textContent = '🔒 Buy Tickets';
          btn.disabled = false;
        });
      };

      if (total === 0) {
        doFinish('free');
        return;
      }

      nexaPayWithPaystack({
        email:     email,
        amount:    total,
        name:      name,
        orderId:   'TKT-' + currentEvent.id + '-' + Date.now(),
        orderType: 'ticket',
        onSuccess: function(reference) {
          doFinish(reference);
        },
        onCancel: function() {
          btn.textContent = '🔒 Buy Tickets';
          btn.disabled = false;
          showToast('⚠️ Payment cancelled', '#ff9500');
        }
      });
    }

    function showError() {
      var page = document.getElementById('event-page');
      page.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">😕</div>' +
          '<h3>Event not found</h3>' +
          '<p>This event may have been removed</p>' +
          '<a href="browse.html" class="btn-primary">Browse Events</a>' +
        '</div>';
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadEvent();
    });

  </script>

</body>
</html>
