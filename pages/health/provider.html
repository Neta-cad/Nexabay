<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Health Provider — Nexabay</title>
  <link rel="stylesheet" href="../../css/main.css"/>
  <link rel="stylesheet" href="../../css/health.css"/>
  <link rel="stylesheet" href="../../css/product.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="../../index.html" class="logo">
        <span class="logo-nexa">Nexa</span><span class="logo-bay">bay</span>
      </a>
      <div class="nav-actions">
        <a href="browse.html" class="nav-link">← All Providers</a>
      </div>
      <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <a href="../../index.html">Home</a>
      <a href="browse.html">Health</a>
      <a href="../auth/login.html">Login</a>
    </div>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <div class="container">
      <a href="../../index.html">Home</a>
      <span>›</span>
      <a href="browse.html">Health</a>
      <span>›</span>
      <span id="bread-name">Provider</span>
    </div>
  </div>

  <!-- PROVIDER PAGE -->
  <div class="container product-page" id="provider-page">
    <div class="loading-state">
      <div class="loading-spinner">⏳</div>
      <p>Loading provider...</p>
    </div>
  </div>

  <!-- APPOINTMENT MODAL -->
  <div id="appt-modal-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:900;" onclick="closeApptModal()"></div>
  <div id="appt-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:14px;max-width:420px;width:90%;max-height:88vh;overflow-y:auto;z-index:901;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:1.1em;font-weight:700;">📅 Book Appointment</h3>
      <button onclick="closeApptModal()" style="background:var(--gray);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;">✕</button>
    </div>

    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="ap-name" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="ap-email" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>Phone *</label>
      <input type="tel" id="ap-phone" placeholder="080xxxxxxxx"/>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label>Appointment Date *</label>
        <input type="date" id="ap-date"/>
      </div>
      <div class="form-group">
        <label>Preferred Time *</label>
        <select id="ap-time">
          <option value="">Select time</option>
          <option>8:00 AM</option>
          <option>9:00 AM</option>
          <option>10:00 AM</option>
          <option>11:00 AM</option>
          <option>12:00 PM</option>
          <option>1:00 PM</option>
          <option>2:00 PM</option>
          <option>3:00 PM</option>
          <option>4:00 PM</option>
          <option>5:00 PM</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Reason for Visit</label>
      <textarea id="ap-reason" rows="3" placeholder="Briefly describe your symptoms or reason..."></textarea>
    </div>

    <div style="background:var(--gray);border-radius:8px;padding:12px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:0.9em;margin-bottom:4px;">
        <span>Consultation Fee</span>
        <span id="ap-fee-display" style="font-weight:800;color:var(--orange);">₦0</span>
      </div>
      <div style="font-size:0.78em;color:var(--text2);">🔒 Payment secured by Nexabay Escrow</div>
    </div>

    <div id="ap-error" class="ap-error" style="display:none;"></div>
    <div id="ap-success" class="ap-success" style="display:none;"></div>

    <button id="ap-pay-btn" onclick="confirmAppointment()" style="width:100%;padding:14px;background:var(--orange);color:white;border:none;border-radius:8px;font-weight:700;font-size:1em;cursor:pointer;">
      🔒 Confirm & Pay
    </button>
  </div>

  <div style="margin-bottom:48px;"></div>

  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase/config.js"></script>
  <script src="../../js/firebase/auth.js"></script>
  <script src="../../js/firebase/health.js"></script>
  <script src="../../js/firebase/payment.js"></script>
  <script src="../../js/core/main.js"></script>
  <script>

    var currentProvider = null;

    function loadProvider() {
      var id = getParam('id');
      if (!id) { showError(); return; }

      db.collection('healthListings').doc(id).get()
        .then(function(doc) {
          if (!doc.exists) { showError(); return; }
          var data = doc.data();
          currentProvider = data;
          currentProvider.id = doc.id;

          renderProvider(data);
          document.title = data.name + ' — Nexabay Health';
          var bread = document.getElementById('bread-name');
          if (bread) bread.textContent = data.name;
        })
        .catch(function(err) {
          console.log('Error:', err);
          showError();
        });
    }

    function renderProvider(p) {
      var page = document.getElementById('provider-page');

      var mainContent = p.imageUrl
        ? '<img src="' + p.imageUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>'
        : p.emoji || '👨‍⚕️';

      var typeIcon = { doctor: '👨‍⚕️', hospital: '🏥', pharmacy: '💊', lab: '🔬' }[p.listingType] || '🏥';
      var typeLabel = { doctor: 'Doctor', hospital: 'Hospital', pharmacy: 'Pharmacy', lab: 'Laboratory' }[p.listingType] || 'Provider';

      var availabilityHtml = '';
      if (p.availableDays && p.availableDays.length > 0) {
        availabilityHtml =
          '<div class="pd-divider"></div>' +
          '<div class="pd-desc">' +
            '<h3>Availability</h3>' +
            '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">' +
              p.availableDays.map(function(day) {
                return '<span style="background:var(--gray);padding:6px 12px;border-radius:6px;font-size:0.85em;font-weight:600;">' + day + '</span>';
              }).join('') +
            '</div>' +
            (p.availableFrom ? '<div style="margin-top:8px;font-size:0.85em;color:var(--text2);">🕒 ' + p.availableFrom + ' — ' + p.availableTo + '</div>' : '') +
          '</div>';
      }

      var extraHtml = '';
      if (p.qualifications) {
        extraHtml += '<div class="pd-delivery-item">🎓 <b>Qualifications:</b> ' + p.qualifications + '</div>';
      }
      if (p.experience) {
        extraHtml += '<div class="pd-delivery-item">⏱️ <b>Experience:</b> ' + p.experience + '</div>';
      }
      if (p.address) {
        extraHtml += '<div class="pd-delivery-item">📍 <b>Address:</b> ' + p.address + '</div>';
      }

      page.innerHTML =
        '<div class="product-detail">' +

          '<div class="pd-left">' +
            '<div class="pd-main-img" style="border-radius:' + (p.listingType === 'doctor' ? '50%' : '8px') + ';overflow:hidden;">' + mainContent + '</div>' +
            '<div class="pd-badges">' +
              '<span class="pd-badge verified">✅ Verified ' + typeLabel + '</span>' +
              '<span class="pd-badge secure">🔒 Secure Payment</span>' +
            '</div>' +
          '</div>' +

          '<div class="pd-right">' +

            '<div class="pd-category">' + typeIcon + ' ' + (p.specialization || p.category || typeLabel) + '</div>' +
            '<h1 class="pd-name">' + p.name + '</h1>' +

            '<div class="pd-rating-row">' +
              '<span class="pd-stars">⭐ ' + (p.rating || 'New') + '</span>' +
              '<span class="pd-reviews">(' + (p.reviews || 0) + ' reviews)</span>' +
              '<span class="pd-sold">📅 ' + (p.appointments || 0) + ' appointments</span>' +
            '</div>' +

            '<div class="pd-price-row">' +
              '<span class="pd-price">₦' + parseInt(p.consultationFee).toLocaleString() + '</span>' +
              '<span style="color:var(--text2);font-size:0.9em;"> per consultation</span>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-desc">' +
              '<h3>About</h3>' +
              '<p>' + (p.description || 'No description provided.') + '</p>' +
            '</div>' +

            (extraHtml ? '<div class="pd-divider"></div><div class="pd-delivery">' + extraHtml + '</div>' : '') +

            availabilityHtml +

            '<div class="pd-divider"></div>' +

            '<div class="pd-seller">' +
              '<div class="pd-seller-avatar">' + (p.providerName || 'P')[0] + '</div>' +
              '<div>' +
                '<div class="pd-seller-name">' + (p.providerName || 'Nexabay Health') + '</div>' +
                '<div class="pd-seller-loc">📍 ' + p.location + '</div>' +
              '</div>' +
              '<a href="#" class="pd-chat-btn">💬 Chat</a>' +
            '</div>' +

            '<div class="pd-divider"></div>' +

            '<div class="pd-actions">' +
              '<button class="pd-buy-btn" onclick="openApptModal()">📅 Book Appointment</button>' +
            '</div>' +

          '</div>' +
        '</div>';
    }

    function openApptModal() {
      var user = JSON.parse(localStorage.getItem('nexa_current_user') || 'null');
      if (!user) {
        showToast('⚠️ Please login to book', '#ff9500');
        setTimeout(function() { window.location.href = '../auth/login.html'; }, 1500);
        return;
      }

      document.getElementById('ap-name').value  = user.fullName || user.firstName || '';
      document.getElementById('ap-email').value = user.email || '';
      document.getElementById('ap-phone').value = user.phone || '';

      var today = new Date().toISOString().split('T')[0];
      document.getElementById('ap-date').value = today;
      document.getElementById('ap-fee-display').textContent = '₦' + parseInt(currentProvider.consultationFee).toLocaleString();

      document.getElementById('appt-modal-overlay').style.display = 'block';
      document.getElementById('appt-modal').style.display = 'block';
    }

    function closeApptModal() {
      document.getElementById('appt-modal-overlay').style.display = 'none';
      document.getElementById('appt-modal').style.display = 'none';
    }

    function confirmAppointment() {
      var name   = document.getElementById('ap-name').value.trim();
      var email  = document.getElementById('ap-email').value.trim();
      var phone  = document.getElementById('ap-phone').value.trim();
      var date   = document.getElementById('ap-date').value;
      var time   = document.getElementById('ap-time').value;
      var reason = document.getElementById('ap-reason').value.trim();
      var errEl  = document.getElementById('ap-error');
      var sucEl  = document.getElementById('ap-success');

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!name)  { errEl.textContent = 'Enter your name';  errEl.style.display = 'block'; return; }
      if (!email) { errEl.textContent = 'Enter your email'; errEl.style.display = 'block'; return; }
      if (!phone) { errEl.textContent = 'Enter your phone'; errEl.style.display = 'block'; return; }
      if (!date)  { errEl.textContent = 'Select a date';    errEl.style.display = 'block'; return; }
      if (!time)  { errEl.textContent = 'Select a time';    errEl.style.display = 'block'; return; }

      var btn = document.getElementById('ap-pay-btn');
      btn.textContent = 'Processing...';
      btn.disabled = true;

      var fee = currentProvider.consultationFee || 0;

      var doFinish = function(reference) {
        nexaBookAppointment(currentProvider.id, {
          patientName:     name,
          patientEmail:    email,
          patientPhone:    phone,
          providerName:    currentProvider.name,
          listingType:     currentProvider.listingType,
          appointmentDate: date,
          appointmentTime: time,
          reason:          reason,
          consultationFee: fee,
          paymentRef:      reference || '',
          providerId:      currentProvider.providerId,
        }).then(function() {
          sucEl.textContent = '🎉 Appointment booked! ' + currentProvider.name + ' will contact you shortly.';
          sucEl.style.display = 'block';
          btn.textContent = '✅ Booked!';
          setTimeout(function() { closeApptModal(); }, 2000);
        }).catch(function(err) {
          sucEl.textContent = '🎉 Payment successful! Appointment being confirmed.';
          sucEl.style.display = 'block';
          btn.textContent = '✅ Booked!';
        });
      };

      if (fee === 0) {
        doFinish('free');
        return;
      }

      nexaPayWithPaystack({
        email:     email,
        amount:    fee,
        name:      name,
        orderId:   'APPT-' + currentProvider.id + '-' + Date.now(),
        orderType: 'appointment',
        onSuccess: function(reference) {
          doFinish(reference);
        },
        onCancel: function() {
          btn.textContent = '🔒 Confirm & Pay';
          btn.disabled = false;
          showToast('⚠️ Booking cancelled', '#ff9500');
        }
      });
    }

    function showError() {
      document.getElementById('provider-page').innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">😕</div>' +
          '<h3>Provider not found</h3>' +
          '<p>This listing may have been removed</p>' +
          '<a href="browse.html" class="btn-primary">Browse Health</a>' +
        '</div>';
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadProvider();
    });

  </script>

</body>
</html>
